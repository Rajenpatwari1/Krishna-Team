            0% { transform: translateX(-150%) skewX(-15deg); }

        .badge-masters { background: linear-gradient(135deg, #6b21a8, #a855f7, #d8b4fe); color: #fff; border: 1px solid #e9d5ff; text-shadow: 0 1px 2px rgba(0,0,0,0.4); }
        .badge-elites { background: linear-gradient(135deg, #047857, #10b981, #6ee7b7); color: #fff; border: 1px solid #a7f3d0; text-shadow: 0 1px 2px rgba(0,0,0,0.4); }
        
        .badge-glare {

        .delay-100 { animation-delay: 0.1s; }
        .delay-200 { animation-delay: 0.2s; }
        .delay-300 { animation-delay: 0.3s; }

        @keyframes growWidth {

        const formatCurrency = (val) => new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR', maximumFractionDigits: 0 }).format(val || 0);
        const formatNumber = (val) => new Intl.NumberFormat('en-IN', { maximumFractionDigits: 1 }).format(val || 0);
        const formatPercent = (val) => `${formatNumber(val)}%`;
        
        const getProfilePic = (name, row) => {
            if (!name) return null;
            const n = name.toLowerCase();
            if (n.includes('karan')) return 'https://drive.google.com/thumbnail?id=1AOFBaNn_3QoZoF7Mgf1i82kUKOFRcfou&sz=w200';
            if (n.includes('meghna')) return 'https://drive.google.com/thumbnail?id=1FjX8XrdFUNtqEmJYTW1yd03BZcS58Tuo&sz=w200';
            if (row) {
                let photoUrl = null;
                const keys = Object.keys(row);
                for (let k of keys) { if (k.toLowerCase().includes('photo') || k.toLowerCase().includes('image') || k.toLowerCase().includes('link')) { photoUrl = row[k]; break; } }
                if (!photoUrl) { for (let k of keys) { if (typeof row[k] === 'string' && row[k].trim().startsWith('http')) { photoUrl = row[k].trim(); break; } } }
                if (photoUrl && typeof photoUrl === 'string' && photoUrl.trim() !== '') {
                    if (photoUrl.includes('drive.google.com/file/d/')) {
                        const match = photoUrl.match(/\/d\/([a-zA-Z0-9_-]+)/);
                        if (match) return `https://drive.google.com/thumbnail?id=${match[1]}&sz=w200`;
                    }
                    return photoUrl;
                }
            }
            return `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=e8f0fe&color=1a73e8&bold=true`;
        };

        const parseCSV = (csvText) => {
            const lines = csvText.split(/\r?\n/).filter(l => l.trim() !== '');
            if (lines.length < 2) return [];
            const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
            return lines.slice(1).map(line => {
                const values = line.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || [];
                const obj = {};
                headers.forEach((header, i) => {
                    let val = values[i] ? values[i].replace(/^"|"$/g, '').trim() : '';
                    let cleanStr = val.replace(/[₹$,%]/g, '');
                    if (!isNaN(cleanStr) && cleanStr !== '') val = Number(cleanStr);
                    obj[header] = val;
                });
                return obj;
            });
        };

        const Icon = ({ name, size = 18, className = "" }) => {

                        <div className="flex items-center space-x-2 z-10 relative mb-4">

        const DonutChart = ({ stats }) => {
            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            useEffect(() => {
                if (!chartRef.current || !window.Chart) return;
                if (chartInstance.current) chartInstance.current.destroy();

                const ctx = chartRef.current.getContext('2d');
                chartInstance.current = new window.Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: ['Target Met', 'Good', 'Average', 'At Risk'],
                        datasets: [{
                            data: [stats.targetMet, stats.good, stats.average, stats.atRisk],
                            // Emerald, Blue, Amber, Red (matching screenshot exactly)
                            backgroundColor: ['#10b981', '#3b82f6', '#f59e0b', '#ef4444'],
                            borderWidth: 0,
                            hoverOffset: 4
                        }]
                    },
                    options: {
                        cutout: '82%',
                        spacing: 4, // Creates the transparent gaps between segments
                        borderRadius: 10, // Creates the pill-like rounded edges
                        plugins: {
                            legend: { display: false },
                            tooltip: { enabled: true }
                        },
                        maintainAspectRatio: false
                    }
                });

                return () => { if (chartInstance.current) chartInstance.current.destroy(); }
            }, [stats]);

            return (
                <div className="relative w-48 h-48 mx-auto">
                    <canvas ref={chartRef}></canvas>
                    <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                        <span className="text-4xl font-extrabold text-gray-900">{stats.total}</span>
                        <span className="text-[9px] font-bold text-gray-400 uppercase tracking-widest mt-1">Total BDEs</span>
                    </div>
                </div>
            );
        };

        const TeamOverviewRow = ({ stats, contributors, kpis }) => {
            return (
                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 animate-slide-up delay-100">
                    {/* Left: Donut Chart Overview */}
                    <div className="hover-card-lift bg-white rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-gray-100 p-6 lg:col-span-1 flex flex-col relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-gray-100 to-gray-200"></div>
                        <h3 className="text-sm font-bold text-gray-800 tracking-tight mb-8">Team Performance Overview</h3>
                        
                        <div className="flex-grow flex flex-col justify-center">
                            <DonutChart stats={stats} />
                            
                            <div className="grid grid-cols-2 gap-x-4 gap-y-4 mt-10 px-2">
                                <div className="flex justify-between items-center">
                                    <div className="flex items-center"><span className="w-2.5 h-2.5 rounded-full bg-emerald-500 mr-2"></span><span className="font-bold text-gray-500 uppercase tracking-widest text-[9px]">Target Met</span></div>
                                    <span className="font-bold text-gray-900 text-xs">{stats.targetMet}</span>
                                </div>
                                <div className="flex justify-between items-center">
                                    <div className="flex items-center"><span className="w-2.5 h-2.5 rounded-full bg-blue-500 mr-2"></span><span className="font-bold text-gray-500 uppercase tracking-widest text-[9px]">Good</span></div>
                                    <span className="font-bold text-gray-900 text-xs">{stats.good}</span>
                                </div>
                                <div className="flex justify-between items-center">
                                    <div className="flex items-center"><span className="w-2.5 h-2.5 rounded-full bg-amber-500 mr-2"></span><span className="font-bold text-gray-500 uppercase tracking-widest text-[9px]">Average</span></div>
                                    <span className="font-bold text-gray-900 text-xs">{stats.average}</span>
                                </div>
                                <div className="flex justify-between items-center">
                                    <div className="flex items-center"><span className="w-2.5 h-2.5 rounded-full bg-red-500 mr-2"></span><span className="font-bold text-gray-500 uppercase tracking-widest text-[9px]">At Risk</span></div>
                                    <span className="font-bold text-gray-900 text-xs">{stats.atRisk}</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Right: Top Contributors List */}
                    <div className="hover-card-lift bg-white rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-gray-100 p-6 lg:col-span-2 flex flex-col relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-50 to-indigo-50"></div>
                        <h3 className="text-sm font-bold text-gray-800 tracking-tight mb-6">Top Sales Contributors</h3>
                        <div className="flex flex-col space-y-3.5">
                            {contributors.map((emp, idx) => {
                                const rankColor = idx === 0 ? 'text-amber-500' : idx === 1 ? 'text-gray-400' : idx === 2 ? 'text-amber-700' : 'text-gray-300';
                                const bgTint = idx < 3 ? 'bg-[#fffcf5]' : 'bg-white';
                                const borderTint = idx < 3 ? 'border-amber-100/50' : 'border-gray-100';
                                const pctOfTotal = kpis.totalTarget > 0 ? (emp.achieved / kpis.totalTarget) * 100 : 0;
                                const progressPct = Math.min((emp.target > 0 ? (emp.achieved / emp.target) : 0) * 100, 100);

                                return (
                                    <div key={idx} className={`relative rounded-xl border ${borderTint} p-3.5 flex items-center justify-between overflow-hidden shadow-[0_2px_10px_rgb(0,0,0,0.02)] ${bgTint}`}>
                                        {/* Bottom Progress Line */}
                                        <div className="absolute bottom-0 left-0 h-1 bg-google-blue rounded-r-full animate-grow-width" style={{ width: `${progressPct}%` }}></div>

                                        <div className="flex items-center space-x-4">
                                            <span className={`text-lg font-extrabold w-6 text-center ${rankColor}`}>#{idx + 1}</span>
                                            <img src={emp.photo} alt={emp.name} className="w-10 h-10 rounded-full object-cover shadow-sm border border-white" />
                                            <span className="font-bold text-gray-800 text-sm">{emp.name}</span>
                                        </div>

                                        <div className="flex flex-col items-end">
                                            <div className="text-sm">
                                                <span className="font-bold text-gray-900">{formatCurrency(emp.achieved)}</span>
                                                <span className="text-gray-400 font-medium text-[11px] ml-1">/ {formatCurrency(emp.target)}</span>
                                            </div>
                                            <div className="mt-1.5 inline-block px-2 py-[3px] bg-[#1a1f2c] rounded text-[8px] font-bold text-white tracking-widest shadow-sm">
                                                {formatNumber(pctOfTotal)}% OF OVERALL TARGET
                                            </div>
                                        </div>
                                    </div>
                                )
                            })}
                        </div>
                    </div>
                </div>
            );
        };

        const Dashboard = ({ userRole, currentUser, onLogout, onOpenAdmin }) => {
            const [rawData, setRawData] = useState([]);
            const [filters, setFilters] = useState({ month: 'All', manager: 'All', search: '' });
            
            const sourceUrl = 'https://docs.google.com/spreadsheets/d/1faXYMBSYEOlUNxmEMS6-LufCwHiOxk_sVKVvqVv3Q_o/gviz/tq?tqx=out:csv&sheet=Dashboard';

            const fetchData = useCallback(async () => {
                try {
                    const response = await fetch(sourceUrl);
                    if (!response.ok) throw new Error("Network error");
                    const text = await response.text();
                    const parsed = parseCSV(text);
                    if (parsed.length > 0 && parsed[0]['Employee Name']) setRawData(parsed);
                } catch (error) { console.warn("Using fallback data"); }
            }, [sourceUrl]);

            useEffect(() => {
                fetchData();
                const interval = setInterval(() => fetchData(), 15000);
                return () => clearInterval(interval);
            }, [fetchData]);

            const availableMonths = useMemo(() => [...new Set(rawData.map(d => d.Month).filter(Boolean))].sort(), [rawData]);
            const availableManagers = useMemo(() => [...new Set(rawData.map(d => d['Manager Name']).filter(Boolean))].sort(), [rawData]);

            const filteredData = useMemo(() => {
                const data = rawData.filter(row => {
                    if (!row['Employee Name']) return false;
                    const matchMonth = filters.month === 'All' || row.Month === filters.month;
                    const matchManager = filters.manager === 'All' || row['Manager Name'] === filters.manager;
                    const matchSearch = row['Employee Name']?.toLowerCase().includes(filters.search.toLowerCase()) || false;
                    return matchMonth && matchManager && matchSearch;
                });
                return data.sort((a, b) => {
                    const pctA = (Number(a['Sales Achieved']) || 0) / (Number(a.Target) || 1);
                    const pctB = (Number(b['Sales Achieved']) || 0) / (Number(b.Target) || 1);
                    return pctB - pctA;
                });
            }, [rawData, filters]);

            const kpis = useMemo(() => {
                if (!filteredData.length) return null;
                let totalTarget = 0, totalAchieved = 0;
                filteredData.forEach(row => { totalTarget += Number(row.Target) || 0; totalAchieved += Number(row['Sales Achieved']) || 0; });
                
                const achievementPercent = totalTarget > 0 ? (totalAchieved / totalTarget) * 100 : 0;
                const shortfall = Math.max(0, totalTarget - totalAchieved);
                const shortfallPercent = totalTarget > 0 ? (shortfall / totalTarget) * 100 : 0;
                
                let topEmp = null, topEmpPct = -1;
                filteredData.forEach(emp => {
                    const achieved = Number(emp['Sales Achieved']) || 0;
                    const target = Number(emp.Target) || 0;
                    // STRICT RULE: Must have more than 0 achieved AND more than 0 target to be Top BDE
                    if (achieved > 0 && target > 0) {
                        const pct = (achieved / target) * 100;
                        if (pct > topEmpPct) { topEmpPct = pct; topEmp = emp; }
                    }
                });

                const mgrStats = {};
                filteredData.forEach(row => {
                    const mgr = row['Manager Name'];
                    if (!mgr) return;
                    if (!mgrStats[mgr]) mgrStats[mgr] = { target: 0, achieved: 0 };
                    mgrStats[mgr].target += Number(row.Target) || 0;
                    mgrStats[mgr].achieved += Number(row['Sales Achieved']) || 0;
                });

                let topMgr = null, topMgrPct = -1;
                Object.keys(mgrStats).forEach(mgr => {
                    // STRICT RULE: Manager must have more than 0 achieved to be Top Manager
                    if (mgrStats[mgr].achieved > 0 && mgrStats[mgr].target > 0) {
                        const pct = (mgrStats[mgr].achieved / mgrStats[mgr].target) * 100;
                        if (pct > topMgrPct) { topMgrPct = pct; topMgr = mgr; }
                    }
                });

                return { 
                    totalTarget, totalAchieved, achievementPercent, shortfall, shortfallPercent, 
                    topBDE: topEmp ? { name: topEmp['Employee Name'], pct: topEmpPct, photo: getProfilePic(topEmp['Employee Name'], topEmp) } : null, 
                    topManager: topMgr ? { name: topMgr, pct: topMgrPct, photo: getProfilePic(topMgr, null) } : null 
                };
            }, [filteredData]);

            const performanceStats = useMemo(() => {
                const stats = { targetMet: 0, good: 0, average: 0, atRisk: 0, total: filteredData.length };
                filteredData.forEach(row => {
                    const target = Number(row.Target) || 0;
                    const achieved = Number(row['Sales Achieved']) || 0;
                    const pct = target > 0 ? (achieved / target) * 100 : 0;
                    if (pct >= 100) stats.targetMet++;
                    else if (pct >= 75) stats.good++;
                    else if (pct >= 40) stats.average++;
                    else stats.atRisk++;
                });
                return stats;
            }, [filteredData]);

            const topContributors = useMemo(() => {
                return [...filteredData]
                    .map(row => ({
                        name: row['Employee Name'],
                        photo: getProfilePic(row['Employee Name'], row),
                        target: Number(row.Target) || 0,
                        achieved: Number(row['Sales Achieved']) || 0,
                    }))
                    .filter(emp => emp.achieved > 0) // STRICT RULE: Remove anyone with 0 achievements
                    .sort((a, b) => b.achieved - a.achieved)
                    .slice(0, 5); // Take Top 5
            }, [filteredData]);

            const teamMVPs = useMemo(() => {
                if (!filteredData.length) return [];
                const mgrMap = {};
                filteredData.forEach(d => {
                    const mgr = d['Manager Name'];
                    if (!mgr) return;
                    const rev = Number(d['Sales Achieved']) || 0;
                    if (rev <= 0) return; // Must have revenue > 0 to be MVP
                    if (!mgrMap[mgr] || rev > mgrMap[mgr].revenue) {
                        mgrMap[mgr] = {
                            name: d['Employee Name'], manager: mgr, revenue: rev, target: Number(d.Target) || 0,
                            runRate: Number(d['Daily Run Rate']) || 0, photo: getProfilePic(d['Employee Name'], d), teamTarget: 0 
                        };
                    }
                });
                filteredData.forEach(d => {
                    const mgr = d['Manager Name'];
                    if (mgr && mgrMap[mgr]) mgrMap[mgr].teamTarget += (Number(d.Target) || 0);
                });
                return Object.values(mgrMap).sort((a, b) => b.revenue - a.revenue);
            }, [filteredData]);

            const achieverTiers = useMemo(() => {
                if (!filteredData.length) return [];
                const achievers = [...filteredData]
                    .map(d => ({ 
                        name: d['Employee Name'], revenue: Number(d['Sales Achieved']) || 0, target: Number(d.Target) || 0, 
                        photo: getProfilePic(d['Employee Name'], d), pct: (Number(d.Target) || 0) > 0 ? ((Number(d['Sales Achieved']) || 0) / (Number(d.Target) || 1)) * 100 : 0
                    }))
                    .filter(d => d.pct >= 100).sort((a, b) => b.pct - a.pct);

                const getTierConfig = (type) => {
                    if (type === 'legends') return { containerBg: 'bg-[#0f172a]', cardBg: 'bg-[#1e293b]', border: 'border-amber-500/30', title: 'text-white', sub: 'text-amber-400', accent: 'amber', pillBg: 'badge-premium badge-legends' };
                    if (type === 'masters') return { containerBg: 'bg-[#0f172a]', cardBg: 'bg-[#1e293b]', border: 'border-purple-500/30', title: 'text-white', sub: 'text-purple-400', accent: 'purple', pillBg: 'badge-premium badge-masters' };
                    return { containerBg: 'bg-[#0f172a]', cardBg: 'bg-[#1e293b]', border: 'border-emerald-500/30', title: 'text-white', sub: 'text-emerald-400', accent: 'emerald', pillBg: 'badge-premium badge-elites' };
                };

                const tiers = [];
                const legends = achievers.filter(a => a.pct >= 201);
                if (legends.length > 0) tiers.push({ id: 'legends', title: 'Exceptional Performance', subtitle: `${legends.length} ASSOCIATES ACHIEVED 201%+`, icon: 'Crown', tierName: 'EXCEPTIONAL', config: getTierConfig('legends'), members: legends });
                const masters = achievers.filter(a => a.pct >= 150 && a.pct < 201);
                if (masters.length > 0) tiers.push({ id: 'masters', title: 'Outstanding Performance', subtitle: `${masters.length} ASSOCIATES ACHIEVED 150%+`, icon: 'Zap', tierName: 'OUTSTANDING', config: getTierConfig('masters'), members: masters });
                const elites = achievers.filter(a => a.pct >= 100 && a.pct < 150);
                if (elites.length > 0) tiers.push({ id: 'elites', title: 'Elite Performance', subtitle: `${elites.length} ASSOCIATES ACHIEVED 100%+`, icon: 'Target', tierName: 'ELITE', config: getTierConfig('elites'), members: elites });

                return tiers;
            }, [filteredData]);

            if (!kpis) return (
                <div className="flex h-screen items-center justify-center bg-meta-bg flex-col">
                    <div className="w-10 h-10 border-4 border-gray-200 border-t-google-blue rounded-full animate-spin mb-4"></div>
                </div>
            );

            return (
                <div className="min-h-screen pb-20 font-sans text-gray-900 bg-meta-bg relative">
                    <div className="absolute inset-0 bg-grid-pattern-dark opacity-[0.05] pointer-events-none"></div>
                    
                    {/* Clean Anchored Navbar (Google Style) */}
                    <header className="bg-white border-b border-gray-200 shadow-sm sticky top-0 z-50 relative">
                        <div className="max-w-[1600px] mx-auto px-6 h-16 flex justify-between items-center">
                            <div className="flex items-center space-x-4">
                                <img src="https://drive.google.com/thumbnail?id=16K2KHrjf4Rl9ZY2OTaeS0YSZK9klqwH4&sz=w400" alt="Company Logo" className="h-8 object-contain blend-logo" />
                                <div className="h-6 w-px bg-gray-200 mx-2 hidden sm:block"></div>
                                <h1 className="text-xl font-semibold text-gray-800 tracking-tight hidden sm:block">Sales Performance</h1>
                            </div>
                            <div className="flex items-center space-x-2">
                                {userRole === 'admin' && (
                                    <button onClick={onOpenAdmin} className="px-3 py-1.5 text-sm font-medium rounded-md text-gray-600 hover:bg-gray-100 transition-colors flex items-center">
                                        <Icon name="Settings" size={16} className="mr-1.5" /> Admin Console
                                    </button>
                                )}
                                <select className="bg-gray-50 border border-gray-200 rounded-md py-1.5 px-3 text-sm font-medium text-gray-700 outline-none focus:border-google-blue focus:ring-1 focus:ring-google-blue transition-all cursor-pointer" value={filters.month} onChange={(e) => setFilters({...filters, month: e.target.value})}>
                                    <option value="All">All Time</option>
                                    {availableMonths.map(m => <option key={m} value={m}>{m}</option>)}
                                </select>
                                <div className="w-px h-5 bg-gray-200 mx-1"></div>
                                <button onClick={onLogout} className="px-3 py-1.5 text-sm font-medium rounded-md text-gray-600 hover:bg-red-50 hover:text-red-600 transition-colors flex items-center">Logout</button>
                            </div>
                        </div>
                    </header>

                    <div className="max-w-[1600px] mx-auto px-6 mt-8 space-y-8 animate-fade-in relative z-10">
                        
                        {/* ROW 1: Infographic KPIs */}
                        <TopCardsRow kpis={kpis} />

                        {/* ROW 1.5: Team Overview & Top Contributors */}
                        <TeamOverviewRow stats={performanceStats} contributors={topContributors} kpis={kpis} />

                        {/* ROW 2: Team MVPs (Dark slate & Yellow) */}
                        {teamMVPs.length > 0 && (
                            <div className="space-y-4 pt-2 animate-slide-up delay-200">
                                <h3 className="text-sm font-bold text-gray-900 tracking-tight flex items-center">Team MVPs Spotlight</h3>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    {teamMVPs.map((mvp, idx) => {
                                        const overachieved = Math.max(0, mvp.revenue - mvp.target);
                                        const firstName = mvp.manager.split(' ')[0];
                                        const realization = formatNumber((mvp.revenue / (mvp.target || 1)) * 100);
                                        const cont = formatNumber((mvp.revenue / (mvp.teamTarget || 1)) * 100);

                                        return (
                                            <div key={idx} className="hover-card-lift-dark bg-gradient-to-b from-[#1a1f2c] to-[#0f172a] border border-gray-800/80 rounded-2xl p-6 relative overflow-hidden shadow-[0_8px_30px_rgb(0,0,0,0.12)] h-full flex flex-col">
                                                <div className="absolute top-0 right-0 w-64 h-64 bg-yellow-500/5 rounded-full blur-3xl pointer-events-none"></div>
                                                <div className="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAiIGhlaWdodD0iMjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iMSIgY3k9IjEiIHI9IjEiIGZpbGw9InJnYmEoMjU1LDI1NSwyNTUsMC4wMykiLz48L3N2Zz4=')] opacity-50 pointer-events-none"></div>
                                                
                                                <div className="flex items-center space-x-4 mb-6 z-10 relative">
                                                    <div className="relative shrink-0">
                                                        <img src={mvp.photo} alt={mvp.name} className="w-14 h-14 rounded-full object-cover border-2 border-yellow-500 shadow-glow-yellow relative z-10" />
                                                    </div>
                                                    <div className="min-w-0">
                                                        <div className="inline-flex px-2 py-0.5 rounded text-[9px] font-bold uppercase tracking-widest text-yellow-500 border border-yellow-500/30 mb-1.5 bg-yellow-500/10 backdrop-blur-sm">{firstName}'S TEAM MVP</div>
                                                        <h3 className="text-xl font-bold text-white tracking-tight truncate drop-shadow-sm">{mvp.name}</h3>
                                                    </div>
                                                </div>
                                                <div className="grid grid-cols-2 gap-y-6 gap-x-4 flex-grow z-10 relative">
                                                    <div className="flex flex-col"><span className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1 flex items-center"><Icon name="TrendingUp" size={12} className="mr-1 text-teal-400"/> Achieved</span><span className="text-lg font-bold text-yellow-500 tabular-nums drop-shadow-sm">{formatCurrency(mvp.revenue)}</span></div>
                                                    <div className="flex flex-col"><span className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1 flex items-center"><Icon name="Target" size={12} className="mr-1 text-emerald-400"/> Target</span><span className="text-lg font-bold text-white tabular-nums drop-shadow-sm">{formatCurrency(mvp.target)}</span></div>
                                                    <div className="flex flex-col"><span className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1 flex items-center"><Icon name="Activity" size={12} className="mr-1 text-gray-500"/> Run Rate</span><span className="text-sm font-semibold text-teal-400 tabular-nums">{formatCurrency(mvp.runRate)}</span></div>
                                                    <div className="flex flex-col"><span className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1 flex items-center"><Icon name="Award" size={12} className="mr-1 text-blue-400"/> Overachieved</span><span className="text-sm font-semibold text-blue-400 tabular-nums">{overachieved > 0 ? '+' + formatCurrency(overachieved) : '-'}</span></div>
                                                    
                                                    <div className="col-span-2 mt-auto pt-2">
                                                        <div className="flex justify-between items-end text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-2"><span>Target Realization</span><span className="text-xs font-bold text-yellow-500">{realization}%</span></div>
                                                        <div className="w-full h-1.5 bg-gray-800/80 rounded-full overflow-hidden border border-gray-700/50"><div className="h-full bg-gradient-to-r from-yellow-600 to-yellow-400 rounded-full shadow-glow-yellow animate-grow-width" style={{ width: `${Math.min((mvp.revenue / (mvp.target || 1)) * 100, 100)}%` }}></div></div>
                                                        <div className="mt-4 inline-block px-2.5 py-1.5 text-[9px] font-bold text-yellow-500 border border-yellow-500/20 rounded uppercase tracking-wider bg-yellow-500/5 backdrop-blur-sm">Contributed {cont}% of {firstName}'s team target</div>
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {/* ROW 3: High Achievers Clubs (Dark Neon) */}
                        {achieverTiers.map((tier) => (
                            <div key={tier.id} className={`${tier.config.containerBg} rounded-xl p-6 relative overflow-hidden bg-grid-pattern shadow-sm animate-slide-up delay-300`}>
                                <div className="flex items-center space-x-3 mb-6 relative z-10">
                                    <div className={`w-10 h-10 rounded bg-${tier.config.accent}-500/10 flex items-center justify-center border border-${tier.config.accent}-500/20`}>
                                        <Icon name={tier.icon} size={20} className={`text-${tier.config.accent}-400`} />
                                    </div>
                                    <div>
                                        <h3 className={`text-lg font-bold tracking-tight ${tier.config.title}`}>{tier.title}</h3>
                                        <div className="flex items-center mt-1 text-[10px] font-bold uppercase tracking-widest">
                                            <div className={`w-1.5 h-1.5 rounded-full bg-${tier.config.accent}-400 mr-2`}></div>
                                            <span className={tier.config.sub}>{tier.subtitle}</span>
                                        </div>
                                    </div>
                                </div>

                                <div className="flex flex-wrap gap-4 relative z-10">
                                    {tier.members.map((emp, i) => {
                                        const overachieved = Math.max(0, emp.revenue - emp.target);
                                        const maxVal = Math.max(emp.target, emp.revenue) || 1;
                                        const targetBarPct = (emp.target / maxVal) * 100;
                                        const strokeColor = tier.config.accent === 'emerald' ? '#34d399' : tier.config.accent === 'purple' ? '#c084fc' : '#fbbf24';

                                        return (
                                        <div key={i} className={`hover-card-lift-dark w-[280px] ${tier.config.cardBg} border ${tier.config.border} rounded-xl p-4 flex flex-col relative`}>
                                            <div className="flex items-start justify-between mb-4">
                                                <div className="flex items-center space-x-3">
                                                    <div className="relative">
                                                        <img src={emp.photo} alt={emp.name} className="w-12 h-12 rounded-full object-cover border border-gray-600" />
                                                        <div className={`absolute -bottom-1 -right-1 w-4 h-4 rounded-full bg-${tier.config.accent}-500 flex items-center justify-center border-2 border-[#1e293b]`}><Icon name="Award" size={8} className="text-white"/></div>
                                                    </div>
                                                    <div>
                                                        <h4 className="text-sm font-bold text-white tracking-tight">{emp.name}</h4>
                                                        {/* Animated Metallic Sales Badge */}
                                                        <div className={`mt-1.5 ${tier.config.pillBg}`}>
                                                            {tier.tierName}
                                                            <div className="badge-glare"></div>
                                                        </div>
                                                    </div>
                                                </div>
                                                
                                                <div className="relative w-12 h-12 flex items-center justify-center shrink-0">
                                                    <svg className="absolute inset-0 w-full h-full transform -rotate-90" viewBox="0 0 36 36">
                                                        <path d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="rgba(255,255,255,0.1)" strokeWidth="3" />

        };

        const LoginScreen = ({ onViewerLogin, onAdminLogin, onAdminPasswordReset, adminEmails, error, setError }) => {
            const [mode, setMode] = useState('viewer');
            const [passcode, setPasscode] = useState('');
            const [adminEmail, setAdminEmail] = useState('');
            const [adminPassword, setAdminPassword] = useState('');
            
            const [resetEmail, setResetEmail] = useState('');
            const [resetOtp, setResetOtp] = useState('');
            const [actualOtp, setActualOtp] = useState(''); // Stores the real generated OTP
            const [newAdminPwd, setNewAdminPwd] = useState('');
            const [resetStep, setResetStep] = useState(1);
            const [otherAdminsStr, setOtherAdminsStr] = useState('');
            const [isSending, setIsSending] = useState(false);
            
            const handleSubmit = (e) => {
                e.preventDefault();
                if (mode === 'viewer') onViewerLogin(passcode);
                else if (mode === 'admin') onAdminLogin(adminEmail, adminPassword);
            };

            const handleForgotSubmit = async (e) => {
                e.preventDefault();
                if (resetStep === 1) {
                    if (adminEmails.includes(resetEmail.toLowerCase())) {
                        setIsSending(true);
                        
                        const generatedOtp = Math.floor(100000 + Math.random() * 900000).toString();
                        setActualOtp(generatedOtp);
                        
                        try {
                            // EMAILJS INTEGRATION: Send the OTP to the admin's email
                            await emailjs.send(
                                EMAILJS_SERVICE_ID,
                                EMAILJS_TEMPLATE_ID,
                                {
                                    to_email: resetEmail,
                                    email_to: resetEmail,
                                    reply_to: resetEmail,
                                    user_email: resetEmail,
                                    send_to: resetEmail,
                                    otp_code: generatedOtp,
                                    message: "Admin Password Reset OTP"
                                },
                                EMAILJS_PUBLIC_KEY
                            );
                            setResetStep(2);
                            setError('');
                        } catch (err) {
                            console.error("EmailJS Error:", err);
                            setError(`Email error: ${err.text || 'Service ID not found'}. Check console.`);
                        }
                        setIsSending(false);
                    } else {
                        setError('Access Denied: Email is not an authorized administrator.');
                    }
                } else if (resetStep === 2) {
                    if (resetOtp === actualOtp) { // Verify against the real generated OTP
                        if (!newAdminPwd) { setError('Please enter a new password.'); return; }
                        const success = await onAdminPasswordReset(resetEmail, newAdminPwd);
                        if (success) {
                            const others = adminEmails.filter(email => email !== resetEmail.toLowerCase()).join(', ');
                            setOtherAdminsStr(others);
                            setResetStep(3);
                            setError('');
                            
                            // Send a notification email to OTHER admins that password was changed and share the new password
                            if (others) {
                                emailjs.send(
                                    EMAILJS_SERVICE_ID,
                                    EMAILJS_TEMPLATE_ID,
                                    {
                                        to_email: others,
                                        email_to: others,
                                        reply_to: others,
                                        user_email: others,
                                        send_to: others,
                                        otp_code: `SECURITY ALERT: Admin password was changed by ${resetEmail}. The NEW Admin Password is: ${newAdminPwd}`,
                                        message: "Security Alert: Admin Password Changed"
                                    }, 
                                    EMAILJS_PUBLIC_KEY
                                ).catch(e => console.log("Notification failed", e));
                            }
                        } else {
                            setError('Database error. Could not reset password.');
                        }
                    } else {
                        setError('Invalid OTP. Please check your email again.');
                    }
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center bg-[#F0F2F5] font-sans">
                    <div className="w-full max-w-[420px] px-6 animate-fade-in">
                        <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-10 flex flex-col items-center">
                            <img src="https://drive.google.com/thumbnail?id=16K2KHrjf4Rl9ZY2OTaeS0YSZK9klqwH4&sz=w600" alt="Company Logo" className="h-10 object-contain mb-8 blend-logo" />
                            <h1 className="text-xl font-semibold text-gray-900 tracking-tight mb-2 text-center">Sales Performance Dashboard</h1>
                            <p className="text-sm text-gray-500 mb-8 text-center">{mode === 'viewer' ? 'Use the shared access key' : mode === 'admin' ? 'Use administrator credentials' : 'Reset Administrator Password'}</p>

                            {error && (
                                <div className="w-full bg-red-50 text-red-600 px-4 py-3 rounded-md text-sm mb-6 flex items-start border border-red-100">
                                    <Icon name="AlertTriangle" size={16} className="mr-2 mt-0.5 shrink-0" /><span>{error}</span>
                                </div>
                            )}

                            {mode === 'viewer' ? (
                                <form onSubmit={handleSubmit} className="w-full space-y-5">
                                    <input type="password" required value={passcode} onChange={e => {setPasscode(e.target.value); setError('');}} placeholder="Enter team access key" className="w-full bg-white border border-gray-300 text-gray-900 rounded-md py-3 px-4 focus:outline-none focus:ring-2 focus:ring-google-blue focus:border-google-blue transition-all text-sm placeholder:text-gray-400" />
                                    <button type="submit" className="w-full bg-google-blue hover:bg-google-hover text-white font-semibold py-3 px-4 rounded-md transition-colors text-sm">Continue</button>
                                </form>
                            ) : mode === 'admin' ? (
                                <form onSubmit={handleSubmit} className="w-full space-y-4">
                                    <input type="email" required value={adminEmail} onChange={e => {setAdminEmail(e.target.value); setError('');}} placeholder="Admin Email" className="w-full bg-white border border-gray-300 text-gray-900 rounded-md py-3 px-4 focus:outline-none focus:ring-2 focus:ring-google-blue transition-all text-sm" />
                                    <input type="password" required value={adminPassword} onChange={e => {setAdminPassword(e.target.value); setError('');}} placeholder="Admin Password" className="w-full bg-white border border-gray-300 text-gray-900 rounded-md py-3 px-4 focus:outline-none focus:ring-2 focus:ring-google-blue transition-all text-sm" />
                                    <div className="flex justify-end">
                                        <button type="button" onClick={() => {setMode('forgot_admin'); setError(''); setResetStep(1);}} className="text-xs font-medium text-google-blue hover:underline">Forgot Password?</button>
                                    </div>
                                    <button type="submit" className="w-full bg-google-blue hover:bg-google-hover text-white font-semibold py-3 px-4 rounded-md transition-colors text-sm mt-2">Verify Admin</button>
                                </form>
                            ) : (
                                <div className="w-full">
                                    {resetStep === 1 && (
                                        <form onSubmit={handleForgotSubmit} className="space-y-4">
                                            <p className="text-xs text-gray-500 mb-2">Enter your admin email to receive a password reset OTP.</p>
                                            <input type="email" required value={resetEmail} onChange={e => {setResetEmail(e.target.value); setError('');}} placeholder="Admin Email" className="w-full bg-white border border-gray-300 text-gray-900 rounded-md py-3 px-4 focus:outline-none focus:ring-2 focus:ring-google-blue transition-all text-sm" />
                                            <button type="submit" disabled={isSending} className="w-full bg-google-blue hover:bg-google-hover disabled:bg-gray-400 text-white font-semibold py-3 px-4 rounded-md transition-colors text-sm">
                                                {isSending ? 'Sending OTP to your email...' : 'Send Reset OTP'}

                                        </form>
                                    )}
                                    {resetStep === 2 && (
                                        <form onSubmit={handleForgotSubmit} className="space-y-4">
                                            <div className="bg-green-50 text-green-700 px-3 py-2 rounded-md text-xs mb-2 border border-green-100">Real OTP has been sent to {resetEmail}</div>
                                            <input type="text" required value={resetOtp} onChange={e => {setResetOtp(e.target.value); setError('');}} placeholder="Enter 6-digit OTP from Email" maxLength="6" className="w-full bg-white border border-gray-300 text-gray-900 rounded-md py-3 px-4 focus:outline-none focus:ring-2 focus:ring-google-blue transition-all text-sm text-center tracking-widest" />
                                            <input type="password" required value={newAdminPwd} onChange={e => {setNewAdminPwd(e.target.value); setError('');}} placeholder="Create New Admin Password" className="w-full bg-white border border-gray-300 text-gray-900 rounded-md py-3 px-4 focus:outline-none focus:ring-2 focus:ring-google-blue transition-all text-sm" />
                                            <button type="submit" className="w-full bg-google-blue hover:bg-google-hover text-white font-semibold py-3 px-4 rounded-md transition-colors text-sm">Verify OTP & Change Password</button>
                                        </form>
                                    )}
                                    {resetStep === 3 && (
                                        <div className="text-center space-y-4">
                                            <div className="w-12 h-12 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-2"><Icon name="CheckCircle" size={24} /></div>
                                            <h3 className="text-base font-bold text-gray-900">Password Reset Successful</h3>
                                            <div className="bg-blue-50 border border-blue-100 text-blue-800 text-xs p-3 rounded-md text-left">
                                                <strong>Email Notification Sent:</strong><br/>
                                                An automated email containing the new password has been dispatched to other administrators: <br/><span className="font-semibold">{otherAdminsStr || 'No other admins'}</span>.
                                            </div>
                                            <button type="button" onClick={() => {setMode('admin'); setAdminEmail(resetEmail); setAdminPassword(newAdminPwd); setResetStep(1);}} className="w-full bg-gray-100 hover:bg-gray-200 text-gray-800 font-semibold py-3 px-4 rounded-md transition-colors text-sm">Back to Login</button>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                        <div className="mt-6 text-center">
                            <button type="button" onClick={() => {setMode(mode === 'viewer' || mode === 'forgot_admin' ? 'admin' : 'viewer'); setError('');}} className="text-sm font-medium text-google-blue hover:text-google-hover transition-colors">
                                {mode === 'viewer' || mode === 'forgot_admin' ? 'Sign in as Administrator' : 'Return to viewer login'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const AdminPanel = ({ authConfig, onClose, adminEmail, adminEmails }) => {
            const [newPassword, setNewPassword] = useState('');
            const [statusMsg, setStatusMsg] = useState({ text: '', type: '' });
            const [showOtpStep, setShowOtpStep] = useState(false);
            const [otpInput, setOtpInput] = useState('');
            const [actualOtp, setActualOtp] = useState(''); // Store real OTP
            const [updateSuccess, setUpdateSuccess] = useState(false);
            const [isSending, setIsSending] = useState(false);

            const handleInitiateUpdate = async (e) => {
                e.preventDefault(); if (!newPassword) return;
                setIsSending(true);
                
                const publicKey = "UfJGx42L-EKqI6hpA";

                const generatedOtp = Math.floor(100000 + Math.random() * 900000).toString();
                setActualOtp(generatedOtp);

                try {
                    // EMAILJS INTEGRATION: Send the OTP to the admin's email
                    await emailjs.send(
                        EMAILJS_SERVICE_ID,
                        EMAILJS_TEMPLATE_ID,
                        {
                            to_email: adminEmail,
                            email_to: adminEmail,
                            reply_to: adminEmail,
                            user_email: adminEmail,
                            send_to: adminEmail,
                            otp_code: generatedOtp,
                            message: "Shared Password Change OTP"
                        },
                        EMAILJS_PUBLIC_KEY
                    );
                    setShowOtpStep(true);
                    setStatusMsg({ text: `OTP successfully sent to ${adminEmail}`, type: 'success' });
                } catch (err) {
                    console.error("EmailJS Error:", err);
                    setStatusMsg({ text: `Email error: ${err.text || 'Check Service ID'}`, type: 'error' });
                }
                setIsSending(false);
            };

            const handleVerifyAndSave = async (e) => {
                e.preventDefault();
                if (otpInput !== actualOtp) { setStatusMsg({ text: 'Invalid OTP. Check your email.', type: 'error' }); return; }
                if (!window.firebaseDeps) return;
                try {
                    const configRef = window.firebaseDeps.doc(db, 'artifacts', typeof __app_id !== 'undefined' ? __app_id : 'sales-dashboard-auth', 'public', 'data', 'settings', 'auth_config');
                    await window.firebaseDeps.updateDoc(configRef, { sharedPassword: newPassword });
                    setUpdateSuccess(true);
                    setStatusMsg({ text: '', type: '' });

                    // Optional: Send a notification email to OTHER admins that shared password was changed
                    const otherAdmins = adminEmails.filter(e => e !== adminEmail).join(', ');
                    if (otherAdmins) {
                        emailjs.send(
                            EMAILJS_SERVICE_ID,
                            EMAILJS_TEMPLATE_ID,
                            {
                                to_email: otherAdmins,
                                email_to: otherAdmins,
                                reply_to: otherAdmins,
                                user_email: otherAdmins,
                                send_to: otherAdmins,
                                otp_code: `SECURITY ALERT: The Shared Viewer Password was changed by ${adminEmail}. The NEW Shared Viewer Password is: ${newPassword}`,
                                message: "Security Alert: Shared Password Changed"
                            }, 
                            EMAILJS_PUBLIC_KEY
                        ).catch(e => console.log("Notification failed", e));
                    }

                } catch (err) { setStatusMsg({ text: 'Database error.', type: 'error' }); }
            };

            const otherAdminsStr = adminEmails ? adminEmails.filter(e => e !== adminEmail).join(', ') : '';

            const copyToClipboard = () => {
                navigator.clipboard.writeText(newPassword);
                alert("New password copied! You can now share this with the team.");
                onClose();
            };

            return (
                <div className="fixed inset-0 bg-gray-900/40 backdrop-blur-sm z-[100] flex items-center justify-center p-6 animate-fade-in">
                    <div className="w-full max-w-md bg-white rounded-xl shadow-xl overflow-hidden">
                        <div className="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                            <h2 className="text-base font-semibold text-gray-900">Security Settings</h2>
                            {!updateSuccess && <button onClick={onClose} className="text-gray-400 hover:text-gray-600"><Icon name="X" size={20} /></button>}
                        </div>
                        <div className="p-6">
                            {updateSuccess ? (
                                <div className="text-center py-4">
                                    <div className="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4"><Icon name="CheckCircle" size={32} /></div>
                                    <h3 className="text-lg font-bold text-gray-900 mb-2">Password Updated!</h3>
                                    <p className="text-sm text-gray-500 mb-3">The dashboard is now locked. Users must use the new password below to enter.</p>
                                    <div className="bg-gray-100 p-4 rounded-lg text-lg font-mono tracking-wider font-bold text-gray-800 mb-4 border border-gray-200">{newPassword}</div>
                                    
                                    <div className="bg-blue-50 border border-blue-100 text-blue-800 text-xs p-3 rounded-md text-left mb-6">
                                        <strong>Simulation: Email Dispatched</strong><br/>
                                        An automated email with the new shared password has been sent to the other administrator(s): <br/><span className="font-semibold">{otherAdminsStr || 'None'}</span>
                                    </div>

                                    <button onClick={copyToClipboard} className="w-full bg-google-blue hover:bg-google-hover text-white font-semibold py-3 rounded-md text-sm transition-colors flex items-center justify-center"><Icon name="Copy" size={16} className="mr-2"/> Copy & Share</button>
                                </div>
                            ) : (
                                <>
                                    <h3 className="text-sm font-semibold text-gray-900 mb-1">Change Shared Password</h3>
                                    <p className="text-xs text-gray-500 mb-5">Updating this locks out old users immediately.</p>
                                    
                                    {statusMsg.text && <div className={`px-3 py-2 rounded-md text-xs mb-5 flex items-start ${statusMsg.type === 'success' ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-700'}`}><span>{statusMsg.text}</span></div>}

                                    {!showOtpStep ? (
                                        <form onSubmit={handleInitiateUpdate} className="space-y-4">
                                            <div className="bg-gray-50 border border-gray-200 rounded-md p-3">
                                                <label className="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1">Current Password</label>
                                                <div className="text-sm font-mono text-gray-700">{authConfig?.sharedPassword || 'Loading...'}</div>
                                            </div>
                                            <input type="text" required placeholder="New shared password" value={newPassword} onChange={e => setNewPassword(e.target.value)} className="w-full bg-white border border-gray-300 text-gray-900 rounded-md py-2.5 px-3 focus:ring-2 focus:ring-google-blue focus:border-google-blue text-sm" />
                                            <button type="submit" disabled={isSending} className="w-full bg-google-blue hover:bg-google-hover disabled:bg-gray-400 text-white font-semibold py-2.5 rounded-md text-sm transition-colors">
                                                {isSending ? 'Sending OTP to Email...' : 'Send Verify OTP'}
                                            </button>
                                        </form>
                                    ) : (
                                        <form onSubmit={handleVerifyAndSave} className="space-y-4">
                                            <input type="text" required placeholder="Enter 6-digit OTP" value={otpInput} onChange={e => setOtpInput(e.target.value)} className="w-full bg-white border border-gray-300 text-gray-900 rounded-md py-2.5 px-3 focus:ring-2 focus:ring-google-blue text-center tracking-[0.5em] text-lg" maxLength="6" />
                                            <div className="flex space-x-3">
                                                <button type="button" onClick={() => setShowOtpStep(false)} className="w-1/3 bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold py-2.5 rounded-md text-sm">Cancel</button>
                                                <button type="submit" className="w-2/3 bg-google-blue hover:bg-google-hover text-white font-semibold py-2.5 rounded-md text-sm">Update Password</button>
                                            </div>
                                        </form>
                                    )}
                                </>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [authState, setAuthState] = useState('loading'); 
            const [userRole, setUserRole] = useState(null); 
            const [authConfig, setAuthConfig] = useState(null);
            const [loginError, setLoginError] = useState('');
            const [showAdminPanel, setShowAdminPanel] = useState(false);
            const [currentAdminEmail, setCurrentAdminEmail] = useState('');

            // ADD YOUR ADMIN EMAILS HERE
            const ADMIN_EMAILS = ['rajenpatwari1234@gmail.com', 'krishnaofficial073@gmail.com'];

            useEffect(() => {
                let unsubscribe = null;
                const setup = async () => {
                    const defaultAuth = { sharedPassword: 'dashboard123', adminPassword: 'admin' };
                    const success = await initFirebase();
                    
                    if (success && window.firebaseDeps) {
                        const { doc, setDoc, onSnapshot } = window.firebaseDeps;
                        const appId = typeof __app_id !== 'undefined' ? __app_id : 'sales-dashboard-auth';
                        const configRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'auth_config');
                        
                        unsubscribe = onSnapshot(configRef, async (docSnap) => {
                            if (!docSnap.exists()) {
                                setAuthConfig(defaultAuth);
                                if (authState === 'loading') setAuthState('login');
                                try { await setDoc(configRef, defaultAuth); } catch(e) {}
                            }
                            else {
                                setAuthConfig(docSnap.data());
                                if (authState === 'loading') setAuthState('login');
                            }
                        }, () => { 
                            setAuthConfig(defaultAuth);
                            setLoginError("Offline Mode: Using default passwords."); 
                            setAuthState('login'); 
                        });
                    } else { 
                        setAuthConfig(defaultAuth);
                        setLoginError("External Host Detected: Using default passwords."); 
                        setAuthState('login'); 
                    }
                };
                setup();
                return () => { if (unsubscribe) unsubscribe(); };
            }, []);

            const handleViewerLogin = (pwd) => {
                if (authConfig && pwd === authConfig.sharedPassword) { setUserRole('viewer'); setAuthState('dashboard'); setLoginError(''); }
                else setLoginError("Incorrect password.");
            };

            const handleAdminLogin = (email, pwd) => {
                if (ADMIN_EMAILS.includes(email.toLowerCase()) && authConfig && pwd === authConfig.adminPassword) {
                    setUserRole('admin'); setCurrentAdminEmail(email.toLowerCase()); setAuthState('dashboard'); setLoginError('');
                } else setLoginError("Invalid Administrator credentials.");
            };

            const handleAdminPasswordReset = async (email, newPwd) => {
                if (!window.firebaseDeps) return false;
                try {
                    const configRef = window.firebaseDeps.doc(db, 'artifacts', typeof __app_id !== 'undefined' ? __app_id : 'sales-dashboard-auth', 'public', 'data', 'settings', 'auth_config');
                    await window.firebaseDeps.updateDoc(configRef, { adminPassword: newPwd });
                    return true;
                } catch (err) { return false; }
            };

            if (authState === 'loading') return <div className="flex h-screen items-center justify-center bg-[#F0F2F5] flex-col"><div className="w-10 h-10 border-4 border-gray-200 border-t-google-blue rounded-full animate-spin mb-4"></div></div>;
            if (authState === 'login') return <LoginScreen onViewerLogin={handleViewerLogin} onAdminLogin={handleAdminLogin} onAdminPasswordReset={handleAdminPasswordReset} adminEmails={ADMIN_EMAILS} error={loginError} setError={setLoginError} />;

            return (
                <div>
                    {showAdminPanel && userRole === 'admin' && <AdminPanel authConfig={authConfig} onClose={() => setShowAdminPanel(false)} adminEmail={currentAdminEmail} adminEmails={ADMIN_EMAILS} />}
                    <Dashboard userRole={userRole} currentUser="User" onLogout={() => {setUserRole(null); setCurrentAdminEmail(''); setAuthState('login'); setLoginError(''); setShowAdminPanel(false);}} onOpenAdmin={() => setShowAdminPanel(true)} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
