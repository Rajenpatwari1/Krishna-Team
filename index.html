<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Performance Dashboard</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 
                        sans: ['Inter', 'sans-serif'],
                        display: ['Inter', 'sans-serif']
                    },
                    colors: {

                        meta: { bg: '#f4f6f8', border: '#dadce0', text: '#202124' },
                        dash: { dark: '#1a1f2c', darkbox: '#0f172a', card: '#1e293b' }
                    },
                    boxShadow: {
                        'card': '0 1px 2px 0 rgba(60,64,67,0.3), 0 1px 3px 1px rgba(60,64,67,0.15)',
                        'glow-green': '0 0 20px rgba(16, 185, 129, 0.4)',
                        'glow-blue': '0 0 20px rgba(59, 130, 246, 0.4)',
                        'glow-yellow': '0 0 20px rgba(234, 179, 8, 0.4)',
                        'glow-purple': '0 0 20px rgba(168, 85, 247, 0.4)',
                    }
                }

    </script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <!-- Firebase Imports -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        window.firebaseDeps = { initializeApp, getAuth, signInAnonymously, signInWithCustomToken, getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc, updateDoc };
    </script>

    <style>
        body { 
            background-color: #f4f6f8;
            color: #202124;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        .tabular-nums { font-variant-numeric: tabular-nums; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .blend-logo { mix-blend-mode: multiply; }
        
        .bg-grid-pattern {
            background-size: 40px 40px;
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
        }
        .bg-grid-pattern-dark {
            background-size: 40px 40px;
            background-image: 
                linear-gradient(to right, rgba(0, 0, 0, 0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 0, 0, 0.03) 1px, transparent 1px);
        }

        @keyframes shimmerSweep {
            0% { transform: translateX(-150%) skewX(-15deg); }
            50%, 100% { transform: translateX(150%) skewX(-15deg); }
        }
        .animate-shimmer-sweep { animation: shimmerSweep 3.5s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
        
        @keyframes float-slow {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-8px) rotate(3deg); }
        }
        .animate-float-slow { animation: float-slow 4s ease-in-out infinite; }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 15px rgba(255,255,255,0.1); }
            50% { box-shadow: 0 0 25px rgba(255,255,255,0.6); }
        }
        .animate-pulse-glow { animation: pulse-glow 2s infinite; }

        .badge-premium {
            position: relative; overflow: hidden; display: inline-flex; align-items: center; justify-content: center;
            border-radius: 4px; padding: 3px 10px; font-weight: 900; font-size: 8px;
            letter-spacing: 0.12em; text-transform: uppercase;
            box-shadow: 0 3px 6px rgba(0,0,0,0.4), inset 0 1px 1px rgba(255,255,255,0.5);
            z-index: 10;
        }
        .badge-legends { background: linear-gradient(135deg, #b45309, #f59e0b, #fcd34d); color: #fff; border: 1px solid #fde68a; text-shadow: 0 1px 2px rgba(0,0,0,0.4); }
        .badge-masters { background: linear-gradient(135deg, #6b21a8, #a855f7, #d8b4fe); color: #fff; border: 1px solid #e9d5ff; text-shadow: 0 1px 2px rgba(0,0,0,0.4); }
        .badge-elites { background: linear-gradient(135deg, #047857, #10b981, #6ee7b7); color: #fff; border: 1px solid #a7f3d0; text-shadow: 0 1px 2px rgba(0,0,0,0.4); }
        
        .badge-glare {
            position: absolute; top: 0; left: 0; width: 60%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.7), transparent);
            animation: shimmerSweep 3s infinite; pointer-events: none;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-slide-up { opacity: 0; animation: slideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .delay-100 { animation-delay: 0.1s; }
        .delay-200 { animation-delay: 0.2s; }
        .delay-300 { animation-delay: 0.3s; }
        .delay-400 { animation-delay: 0.4s; }
        .delay-500 { animation-delay: 0.5s; }
        
        @keyframes growWidth {
            from { max-width: 0%; }
            to { max-width: 100%; }
        }
        .animate-grow-width { animation: growWidth 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; overflow: hidden; }
        
        .hover-card-lift { transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .hover-card-lift:hover { transform: translateY(-6px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); z-index: 20; }
        .hover-card-lift-dark { transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .hover-card-lift-dark:hover { transform: translateY(-6px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.4), 0 10px 10px -5px rgba(0, 0, 0, 0.2); z-index: 20; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-presets="react,env">
        /** @jsx React.createElement */
        const { useState, useEffect, useMemo, useRef, useCallback } = React;

        // --- EMAILJS CONFIGURATION ---
        const EMAILJS_SERVICE_ID = "service_ub1jpem"; 
        const EMAILJS_TEMPLATE_ID = "template_uvebuvo";
        const EMAILJS_PUBLIC_KEY = "UfJGx42L-EKqI6hpA";

        // Firebase Setup
        let db, auth;
        const initFirebase = async () => {
            if (!window.firebaseDeps) return false;
            const { initializeApp, getAuth, signInAnonymously, signInWithCustomToken, getFirestore } = window.firebaseDeps;
            try {
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'sales-dashboard-auth';
                const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
                    apiKey: "AIzaSyDUanBEhwScdxtXrs_ExzU7NC63D-twILw",
                    authDomain: "one-paper-542ca.firebaseapp.com",
                    projectId: "one-paper-542ca",
                    storageBucket: "one-paper-542ca.appspot.com",
                    messagingSenderId: "927884948369",
                    appId: "1:927884948369:web:d3de46b8f1fd54f4b5e030"
                };
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app); db = getFirestore(app);
                if (typeof __initial_auth_token !== 'undefined') await signInWithCustomToken(auth, __initial_auth_token);
                else await signInAnonymously(auth);
                return true;
            } catch (e) { return false; }
        };

        const formatCurrency = (val) => new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR', maximumFractionDigits: 0 }).format(val || 0);
        const formatNumber = (val) => new Intl.NumberFormat('en-IN', { maximumFractionDigits: 1 }).format(val || 0);
        const formatPercent = (val) => `${formatNumber(val)}%`;
        
        // Aggressive number extractor to handle any spreadsheet formatting (Rs, INR, commas, text)
        const extractNumber = (val) => {
            if (typeof val === 'number') return val;
            if (val === null || val === undefined || String(val).trim() === '') return 0;
            const cleaned = String(val).replace(/[^0-9.-]/g, '');
            return Number(cleaned) || 0;
        };
        
        const getProfilePic = (name, row) => {
            if (!name) return null;
            const n = name.toLowerCase();
            if (n.includes('karan')) return 'https://drive.google.com/thumbnail?id=1AOFBaNn_3QoZoF7Mgf1i82kUKOFRcfou&sz=w200';
            if (n.includes('meghna')) return 'https://drive.google.com/thumbnail?id=1FjX8XrdFUNtqEmJYTW1yd03BZcS58Tuo&sz=w200';
            if (row) {
                let photoUrl = null;
                const keys = Object.keys(row);
                for (let k of keys) { if (k.toLowerCase().includes('photo') || k.toLowerCase().includes('image') || k.toLowerCase().includes('link')) { photoUrl = row[k]; break; } }
                if (!photoUrl) { for (let k of keys) { if (typeof row[k] === 'string' && row[k].trim().startsWith('http')) { photoUrl = row[k].trim(); break; } } }
                if (photoUrl && typeof photoUrl === 'string' && photoUrl.trim() !== '') {
                    if (photoUrl.includes('drive.google.com/file/d/')) {
                        const match = photoUrl.match(/\/d\/([a-zA-Z0-9_-]+)/);
                        if (match) return `https://drive.google.com/thumbnail?id=${match[1]}&sz=w200`;
                    }
                    return photoUrl;
                }
            }
            return `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=e8f0fe&color=1a73e8&bold=true`;
        };

        const parseCSV = (csvText) => {
            const lines = csvText.split(/\r?\n/).filter(l => l.trim() !== '');
            if (lines.length < 2) return [];
            
            // Robust CSV line parser that properly handles empty cells (,,) and commas inside quotes
            const parseLine = (line) => {
                const result = [];
                let cell = '';
                let inQuotes = false;
                for (let i = 0; i < line.length; i++) {
                    const c = line[i];
                    if (c === '"' && line[i+1] === '"') { cell += '"'; i++; } // Handle escaped quotes
                    else if (c === '"') { inQuotes = !inQuotes; }
                    else if (c === ',' && !inQuotes) { result.push(cell); cell = ''; }
                    else { cell += c; }
                }
                result.push(cell);
                return result;
            };

            let headers = parseLine(lines[0]).map(h => h.trim().replace(/^"|"$/g, ''));
            // Handle duplicate headers like Remaining -> Remaining_2
            let seen = {};
            headers = headers.map(h => {
                let count = seen[h] || 0;
                seen[h] = count + 1;
                return count > 0 ? `${h}_${count + 1}` : h;
            });

            return lines.slice(1).map(line => {
                const values = parseLine(line);
                const obj = {};
                headers.forEach((header, i) => {
                    let val = values[i] ? values[i].replace(/^"|"$/g, '').trim() : '';
                    let cleanStr = val.replace(/[₹$,%]/g, '');
                    if (!isNaN(cleanStr) && cleanStr !== '') val = Number(cleanStr);
                    
                    obj[header] = val;
                    // Create a robust version of the key to easily find columns even with spacing typos
                    const robustKey = header.toLowerCase().replace(/[^a-z0-9]/g, '');
                    obj[`_robust_${robustKey}`] = val;
                });
                return obj;
            });
        };

        // Utility to extract Team Name robustly 
        const getTeamName = (row) => {
            if (row['Individual plus team leader target']) return row['Individual plus team leader target'];
            if (row['_robust_individualplusteamleadertarget']) return row['_robust_individualplusteamleadertarget'];
            // Fuzzy match
            const keys = Object.keys(row).filter(k => !k.startsWith('_robust_'));
            const match = keys.find(k => k.toLowerCase().includes('individual') || k.toLowerCase().includes('leader'));
            return match && row[match] ? row[match] : 'Unknown Team';
        };

        const getManagerName = (row) => {
            if (row['Team Manger']) return row['Team Manger'];
            if (row['Team Manager']) return row['Team Manager'];
            if (row['_robust_teammanger']) return row['_robust_teammanger'];
            if (row['_robust_teammanager']) return row['_robust_teammanager'];
            return 'Unknown Manager';
        };

        const Icon = ({ name, size = 18, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current && name) {
                    const iconMap = { 'CheckCircle': 'CircleCheck', 'CheckCircle2': 'CircleCheck', 'AlertTriangle': 'TriangleAlert', 'RefreshCcw': 'RefreshCw', 'TrendingUp': 'TrendingUp', 'TrendingDown': 'TrendingDown', 'Users': 'Users', 'Activity': 'Activity', 'Info': 'Info', 'Calendar': 'Calendar' };
                    const mappedName = iconMap[name] || name;
                    if (window.lucide.icons[mappedName]) {
                        iconRef.current.innerHTML = `<i data-lucide="${mappedName}"></i>`;
                        window.lucide.createIcons({ icons: { [mappedName]: window.lucide.icons[mappedName] }, nameAttr: 'data-lucide', attrs: { class: className, width: size, height: size, 'stroke-width': 2 } });
                    }
                }
            }, [name, className, size]);
            return <span ref={iconRef} className={`inline-flex items-center justify-center ${className}`}></span>;
        };

        // --- Weekly Target Visual Components --- //
        const WeeklyTargetSection = ({ weeklyData }) => {
            const [selectedWeek, setSelectedWeek] = useState(null);
            const availableWeeks = useMemo(() => [...new Set(weeklyData.map(d => d.Week || d.week).filter(Boolean))].sort(), [weeklyData]);

            // Auto-select current week on load
            useEffect(() => {
                if (selectedWeek === null && availableWeeks.length > 0) {
                    const currentWeekNum = Math.ceil(new Date().getDate() / 7);
                    const weekStr = `Week ${currentWeekNum}`;
                    const match = availableWeeks.find(w => w.toLowerCase() === weekStr.toLowerCase());
                    setSelectedWeek(match || availableWeeks[availableWeeks.length - 1] || 'All');
                }
            }, [availableWeeks, selectedWeek]);

            // Filter by week
            const displayData = useMemo(() => {
                const activeWeek = selectedWeek === null ? 'All' : selectedWeek;
                return weeklyData.filter(row => activeWeek === 'All' || (row.Week || row.week) === activeWeek);
            }, [weeklyData, selectedWeek]);

            // Group into organization levels (Manager -> Teams)
            const orgGroups = useMemo(() => {
                const map = {};
                let overallMaxAchievedPct = -1;
                let topManager = null;
                let topTeam = null;
                let topTeamPct = -1;

                displayData.forEach(row => {
                    let mgr = getManagerName(row);
                    // CRITICAL FIX: Do not drop teams without a manager! Group them safely.
                    if (!mgr || mgr === 'Unknown Manager' || String(mgr).trim() === '') mgr = 'Independent Teams';
                    
                    if (!map[mgr]) map[mgr] = { name: mgr, target: 0, achieved: 0, reportees: [] };
                    
                    const wTarget = extractNumber(row['Weekly Target'] || row._robust_weeklytarget || row['Week Target'] || row._robust_weektarget);
                    const wAchieved = extractNumber(row['Weekly Achieved'] || row._robust_weeklyachieved || row['Week Achieved'] || row._robust_weekachieved);
                    const teamName = getTeamName(row);
                    
                    map[mgr].target += wTarget;
                    map[mgr].achieved += wAchieved;
                    
                    const teamPct = wTarget > 0 ? (wAchieved / wTarget) * 100 : 0;
                    
                    const teamObj = {
                        name: teamName,
                        target: wTarget,
                        achieved: wAchieved,
                        monthTarget: row['Monthly Target'] !== undefined ? row['Monthly Target'] : (row._robust_monthlytarget || row['Month Target'] || row._robust_monthtarget || ''),
                        monthAchieved: row['Month Achieved'] !== undefined ? row['Month Achieved'] : (row._robust_monthachieved || row['Monthly Achieved'] || row._robust_monthlyachieved || ''),
                        monthRemaining: row['Remaining'] !== undefined ? row['Remaining'] : (row._robust_remaining || ''),
                        weekRemaining: row['Remaining_2'] !== undefined ? row['Remaining_2'] : (row.Remaining_2 || ''),
                        week: row.Week || row.week || 'Week 1',
                        pct: teamPct,
                        manager: mgr
                    };
                    
                    map[mgr].reportees.push(teamObj);

                    // Track Top Team individually
                    if (wTarget > 0 && teamPct > topTeamPct) {
                        topTeamPct = teamPct;
                        topTeam = teamObj;
                    }
                });

                // Calculate Manager level totals & Top Manager
                const groupsArray = Object.values(map).map(mgr => {
                    const orgPct = mgr.target > 0 ? (mgr.achieved / mgr.target) * 100 : 0;
                    if (mgr.target > 0 && orgPct > overallMaxAchievedPct) {
                        overallMaxAchievedPct = orgPct;
                        topManager = { ...mgr, pct: orgPct };
                    }
                    return { ...mgr, pct: orgPct };
                }).sort((a,b) => b.achieved - a.achieved);

                return { groupsArray, topManager, topTeam };
            }, [displayData]);

            if (weeklyData.length === 0) return null;

            return (
                <div className="space-y-6 pt-4 animate-slide-up delay-500">
                    <div className="flex flex-col md:flex-row md:items-end justify-between border-b border-gray-200 pb-3 mb-6">
                        <div>
                            <h2 className="text-2xl font-black text-gray-900 tracking-tight">Weekly Performance & Hierarchies</h2>
                            <p className="text-xs font-bold text-gray-500 uppercase tracking-widest mt-1">Aggregated Manager & Team Analytics</p>
                        </div>
                        <div className="mt-4 md:mt-0 flex space-x-3">
                            <select className="bg-white border border-gray-300 rounded-md py-1.5 px-4 text-sm font-bold text-gray-700 focus:ring-2 focus:ring-google-blue shadow-sm cursor-pointer" value={selectedWeek || 'All'} onChange={(e) => setSelectedWeek(e.target.value)}>
                                <option value="All">All Weeks</option>
                                {availableWeeks.map(w => <option key={w} value={w}>{w}</option>)}
                            </select>
                        </div>
                    </div>

                    {/* TOP SPOTLIGHTS ROW */}
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        {/* Top Manager Org Spotlight */}
                        <div className="bg-gradient-to-br from-[#1e1b4b] to-[#312e81] rounded-2xl p-6 relative overflow-hidden shadow-xl border border-indigo-500/30">
                            <div className="absolute top-0 right-0 w-48 h-48 bg-indigo-500/20 rounded-full blur-3xl pointer-events-none"></div>
                            <div className="flex items-center space-x-2 mb-4 relative z-10">
                                <div className="w-8 h-8 rounded bg-indigo-500/30 flex items-center justify-center border border-indigo-400/30"><Icon name="Users" size={16} className="text-indigo-300"/></div>
                                <span className="text-[10px] font-black text-indigo-300 uppercase tracking-widest">Top Manager (Overall Org)</span>
                            </div>
                            <h3 className="text-3xl font-black text-white relative z-10 drop-shadow-md">{orgGroups.topManager ? orgGroups.topManager.name : 'N/A'}</h3>
                            <div className="mt-1 mb-6 relative z-10">
                                <span className="inline-block px-2.5 py-1 bg-black/30 border border-white/10 rounded text-[9px] font-bold text-indigo-200 uppercase tracking-widest">
                                    Combined Target of {orgGroups.topManager ? orgGroups.topManager.reportees.length : 0} Reportees
                                </span>
                            </div>
                            <div className="grid grid-cols-2 gap-4 relative z-10">
                                <div>
                                    <div className="text-2xl font-bold text-white tabular-nums drop-shadow-md">{formatCurrency(orgGroups.topManager?.achieved)}</div>
                                    <div className="text-[10px] font-semibold text-indigo-300 mt-1">/ {formatCurrency(orgGroups.topManager?.target)}</div>
                                </div>
                                <div className="text-right flex flex-col justify-end">
                                    <div className="text-2xl font-black text-emerald-400">{formatNumber(orgGroups.topManager?.pct)}%</div>
                                    <div className="text-[9px] font-bold text-indigo-300 uppercase tracking-widest mt-1">Org Achievement</div>
                                </div>
                            </div>
                            <div className="mt-4 relative h-2 bg-black/40 rounded-full overflow-hidden border border-white/5">
                                <div className="absolute top-0 left-0 h-full bg-gradient-to-r from-emerald-500 to-teal-400 rounded-full shadow-glow-green animate-grow-width" style={{ width: `${Math.min(orgGroups.topManager?.pct || 0, 100)}%` }}></div>
                            </div>
                            <div className="flex justify-between mt-2 text-[9px] font-bold text-indigo-400 uppercase tracking-widest">
                                <span>0%</span><span>Org Goal</span>
                            </div>
                        </div>

                        {/* Top Executing Team Spotlight (Golden) */}
                        <div className="bg-gradient-to-br from-[#451a03] to-[#78350f] rounded-2xl p-6 relative overflow-hidden shadow-xl border border-amber-500/30">
                            <div className="absolute top-0 right-0 w-48 h-48 bg-amber-500/20 rounded-full blur-3xl pointer-events-none"></div>
                            <div className="flex items-center space-x-2 mb-4 relative z-10">
                                <div className="w-8 h-8 rounded bg-amber-500/30 flex items-center justify-center border border-amber-400/30"><Icon name="Award" size={16} className="text-amber-300"/></div>
                                <span className="text-[10px] font-black text-amber-300 uppercase tracking-widest">Top Executing Individual/Team</span>
                            </div>
                            <h3 className="text-2xl font-black text-white relative z-10 drop-shadow-md leading-tight whitespace-normal break-words">{orgGroups.topTeam ? orgGroups.topTeam.name : 'N/A'}</h3>
                            <div className="mt-2 mb-6 relative z-10">
                                <span className="inline-block px-2.5 py-1 bg-black/30 border border-amber-500/20 rounded text-[9px] font-bold text-amber-200 uppercase tracking-widest">
                                    Reporting to: {orgGroups.topTeam ? orgGroups.topTeam.manager : 'N/A'}
                                </span>
                            </div>
                            <div className="grid grid-cols-2 gap-4 relative z-10">
                                <div>
                                    <div className="text-2xl font-bold text-white tabular-nums drop-shadow-md">{formatCurrency(orgGroups.topTeam?.achieved)}</div>
                                    <div className="text-[10px] font-semibold text-amber-300 mt-1">/ {formatCurrency(orgGroups.topTeam?.target)}</div>
                                </div>
                                <div className="text-right flex flex-col justify-end">
                                    <div className="text-2xl font-black text-emerald-400">{formatNumber(orgGroups.topTeam?.pct)}%</div>
                                    <div className="text-[9px] font-bold text-amber-300 uppercase tracking-widest mt-1">Team Achievement</div>
                                </div>
